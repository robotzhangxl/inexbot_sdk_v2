site_name: 纳博特SDK技术文档
site_url: https://robotzhangxl.github.io/inexbot_sdk_v2/
site_description: 纳博特SDK技术文档，包含通讯协议、运动控制、工艺应用等内容
docs_dir: .
theme:
  name: material
  language: zh
  palette:
    primary: blue
    accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight
nav:
